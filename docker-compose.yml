services:
  postgres:
    image: postgres:16-alpine
    container_name: interop_postgres
    environment:
      POSTGRES_DB: interop
      POSTGRES_USER: interop
      POSTGRES_PASSWORD: interop
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interop -d interop"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
    driver: local
